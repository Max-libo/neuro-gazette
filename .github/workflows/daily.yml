name: Daily Issue

on:
  schedule:
    # 07:00 МСК = 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      from_raw:
        description: 'Пропустить сбор и веб-поиск, переделать только редактуру из кэша'
        required: false
        type: boolean
        default: false

permissions:
  contents: write       # нужно для коммита JSON
  actions: write        # нужно для запуска deploy.yml

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.from_raw }}" = "true" ]; then
            ARGS="--from-raw"
            echo "Режим --from-raw: пропускаем сбор и веб-поиск"
          fi
          python scripts/collect.py $ARGS

      - name: Commit new issue
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet && echo "No changes" && exit 0
          DATE=$(python3 -c "import json; print(json.load(open('docs/data/latest.json'))['date'])")
          git commit -m "feat: выпуск $DATE"
          git pull --rebase
          git push

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })

      - name: Notify Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$BOT_TOKEN" ] && exit 0
          DATE=$(date -u +%Y-%m-%d)
          TEXT="📰 Нейрогазета: новый выпуск $DATE готов к редактуре."
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode="Markdown"
